name: 🎓 Surveillance CROUS Orléans

on:
  schedule:
    - cron: "*/15 * * * *"   # toutes les 15 minutes
  workflow_dispatch:           # permet de lancer manuellement depuis GitHub

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Récupérer le code
        uses: actions/checkout@v4

      - name: 🐍 Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 📦 Installer les dépendances
        run: pip install requests beautifulsoup4

      - name: 💾 Restaurer l'état (annonces déjà vues)
        uses: actions/cache@v4
        with:
          path: crous_seen.json
          key: crous-seen-${{ github.run_id }}
          restore-keys: crous-seen-

      - name: 🔍 Lancer la vérification
        env:
          EMAIL_SENDER:    ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD:  ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
        run: python scraper.py

      - name: 💾 Sauvegarder l'état
        uses: actions/cache/save@v4
        if: always()
        with:
          path: crous_seen.json
          key: crous-seen-${{ github.run_id }}